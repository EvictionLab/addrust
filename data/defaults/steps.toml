# addrust default pipeline steps
# Order matters — steps execute top to bottom.

# --- Validation ---
[[step]]
type = "validate"
label = "na_check"
pattern = '(?i)^(N/?A|{na_values})$'
warning = "na_address"
clear = true

# --- City / State / Zip ---
[[step]]
type = "extract"
label = "city_state_zip"
pattern = ',\s*([A-Z][A-Z ]+)\W+{state}\W+(\d{5}(?:\W\d{4})?)(?:\s*US)?$'
target = "extra_back"

# --- PO Box ---
[[step]]
type = "extract"
label = "po_box"
pattern = '\bP\W*O\W*BOX\W*(\d+)\b'
target = "po_box"
skip_if_filled = true
replacement = 'PO BOX $1'

[[step]]
type = "extract"
label = "po_box_word"
pattern = '\bP\W*O\W*BOX\W+(\w+)\b'
target = "po_box"
skip_if_filled = true
replacement = 'PO BOX $1'

# --- Pre-processing rewrites ---
[[step]]
type = "rewrite"
label = "unstick_suffix_unit"
pattern = '\b({suffix_common})({unit_type})\b'
replacement = '$1 $2'

[[step]]
type = "rewrite"
label = "st_to_saint"
pattern = '^(\d{1,6}\s(?:(?:{direction})\s)?)ST\s(?!(?:{unit_location}|{unit_type}|{suffix_all})\b)([A-Z]{3,20})'
replacement = '${1}SAINT $2'

# --- Extra front ---
[[step]]
type = "extract"
label = "extra_front"
pattern = '^(?:(?:[A-Z\W]+\s)+(?=(?:{direction})\s\d))|^(?:(?:[A-Z\W]+\s)+(?=\d))'
target = "extra_front"
skip_if_filled = true

# --- Street number ---
[[step]]
type = "extract"
label = "street_number_coords"
pattern = '^([NSEW])\W?(\d+)\W?([NSEW])\W?(\d+)\b'
target = "street_number"
skip_if_filled = true
replacement = '${1}${2} ${3}${4}'

[[step]]
type = "extract"
label = "street_number"
pattern = '^\d+\b'
target = "street_number"
skip_if_filled = true

[[step]]
type = "extract"
label = "unit_fraction"
pattern = '^[1-9]/\d+\b'
target = "unit"
skip_if_filled = true

# --- Unit ---
[[step]]
type = "extract"
label = "unit_type_value"
pattern = '(?:\b({unit_type})|#)\W*(\d+\W?[A-Z]?|[A-Z]\W?\d+|\d+|[A-Z])\s*$'
target = "unit"
skip_if_filled = true

[[step]]
type = "extract"
label = "unit_pound"
pattern = '#\W*(\w+)\s*$'
target = "unit"
skip_if_filled = true

[[step]]
type = "extract"
label = "unit_location"
pattern = '\b({unit_location})\s*$'
target = "unit"
skip_if_filled = true

# --- Direction ---
[[step]]
type = "extract"
label = "post_direction"
pattern = '(?<!^)\b({direction})\s*$'
target = "post_direction"
skip_if_filled = true

# --- Suffix ---
[[step]]
type = "extract"
label = "suffix_common"
pattern = '(?<!^)\b({suffix_common})\s*$'
target = "suffix"
skip_if_filled = true

[[step]]
type = "extract"
label = "suffix_all"
pattern = '(?<!^)\b({suffix_all})\s*$'
target = "suffix"
skip_if_filled = true

# --- Pre-direction ---
[[step]]
type = "extract"
label = "pre_direction"
pattern = '^\b({direction})\b(?!$)'
target = "pre_direction"
skip_if_filled = true

# --- Street name cleanup ---
[[step]]
type = "rewrite"
label = "street_name_abbr"
pattern = '\b({street_name_abbr$short})\b'
table = "street_name_abbr"

[[step]]
type = "rewrite"
label = "name_st_to_saint"
pattern = '(?:^|\s)ST\b(?=\s[A-Z]{3,})'
replacement = 'SAINT'

# --- Standardization ---
[[step]]
type = "standardize"
label = "standardize_pre_direction"
target = "pre_direction"
matching_table = "direction"
format_table = "direction"

[[step]]
type = "standardize"
label = "standardize_post_direction"
target = "post_direction"
matching_table = "direction"
format_table = "direction"

[[step]]
type = "standardize"
label = "standardize_suffix"
target = "suffix"
matching_table = "suffix_all"
format_table = "suffix_usps"

[[step]]
type = "standardize"
label = "standardize_unit_location"
target = "unit"
matching_table = "unit_location"
format_table = "unit_location"

[[step]]
type = "standardize"
label = "standardize_po_box"
target = "po_box"
pattern = 'P\W*O\W*BOX\W*(\w+)'
replacement = 'PO BOX $1'
