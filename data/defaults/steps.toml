# addrust default pipeline steps
# Order matters — steps execute top to bottom.

# --- Pre-cleaning ---
[[step]]
type = "rewrite"
label = "fix_ampersand"
pattern = '&AMP;'
replacement = '&'

[[step]]
type = "rewrite"
label = "dedup_nonword"
pattern = '(\W)\1+'
replacement = '$1'

[[step]]
type = "rewrite"
label = "period_between"
pattern = '([A-Z0-9])\.([A-Z0-9])'
replacement = '$1 $2'

[[step]]
type = "rewrite"
label = "squish_hyphen"
pattern = '([A-Z0-9])\s*-\s*([A-Z0-9])'
replacement = '$1-$2'

[[step]]
type = "rewrite"
label = "unstick_number_letters"
pattern = '^(\d+)([A-Z]{2,}|[NSEW])'
replacement = '$1 $2'

[[step]]
type = "rewrite"
label = "ampersand_to_and"
pattern = '([A-Z])\s*&\s*([A-Z])'
replacement = '$1 AND $2'

[[step]]
type = "rewrite"
label = "slash_to_space"
pattern = '(?<!\d)/(?!\d)'
replacement = ' '

[[step]]
type = "rewrite"
label = "remove_periods_apostrophes"
pattern = "[.']+"
replacement = ''

[[step]]
type = "rewrite"
label = "remove_punctuation"
pattern = '[;<>$()"]+|`'
replacement = ''

# --- NA removal ---
[[step]]
type = "rewrite"
label = "na_check"
pattern = '(?i)^(N\W?A|{na_values})$'
replacement = ''

# --- City / State / Zip ---
[[step]]
type = "extract"
label = "city_state_zip"
pattern = '(?:^[A-Z][A-Z-]+|,\s*[A-Z][A-Z -]+)\W+({state})\W+(\d{5}(?:\W\d{4})?)(?:\s*US)?$'
output_col = { city = 1, state = 2, zip = 3 }

# --- PO Box ---
[[step]]
type = "extract"
label = "po_box"
pattern = '\b(?:P\W*O\W*BO?X|P[OM]B|P\W*BOX)\W*(\w+)\b'
output_col = "po_box"
skip_if_filled = true
replacement = 'PO BOX $1'

[[step]]
type = "extract"
label = "po_box_num"
pattern = '\b(PO\W*BOX|P[OM]B|BO?X)\W*(\d+[A-Z]?)\b'
output_col = "po_box"
skip_if_filled = true
replacement = 'PO BOX $2'

# --- Number-to-word conversion ---
# Runs early so "HIGHWAY 1" becomes "HIGHWAY ONE" before extra_front
# would split it, and "42ND" becomes "FORTYSECOND" before extraction.
[[step]]
type = "rewrite"
label = "fractional_road"
pattern = '(?<!^)\b(\d{1,3})\s+(\d+)/(\d+)\b'
replacement = '${1:number_cardinal} AND ${2/3:fraction}'

# Must run BEFORE highway_number_to_word so highway-tag variants (e.g.
# `I` → `INTERSTATE`) are expanded first. Otherwise number_to_word
# converts the digits and the variant lookahead can't match anymore.
[[step]]
type = "rewrite"
label = "street_name_highway"
pattern = '\b({street_name:highway})\b'
table = "street_name"

[[step]]
type = "rewrite"
label = "highway_number_to_word"
pattern = '\b({street_name:highway})[\s-]+(\d{1,3})\b'
replacement = '$1 ${2:number_cardinal}'

[[step]]
type = "rewrite"
label = "ordinal_to_word"
pattern = '#?\b(\d{1,3})(ST|ND|RD|TH)\b'
replacement = '${1:number_ordinal}'

[[step]]
type = "rewrite"
label = "ordinal_to_word_no_num"
pattern = '^(\d{1,3}) (ST|ND|RD|TH)\b(?= (?:{suffix:common})\b)'
replacement = '${1:number_ordinal}'

# --- Pre-processing rewrites ---
[[step]]
type = "rewrite"
label = "unstick_suffix_unit"
pattern = '\b({suffix:common})({unit_type}|\d)\b'
replacement = '$1 $2'

[[step]]
type = "rewrite"
label = "unstick_unit_type_unit"
pattern = '\b({unit_type})(\d+)'
replacement = '$1 $2'

[[step]]
type = "rewrite"
label = "dedupe_word"
pattern = '\b({suffix}|{direction}) \1\b'
replacement = '$1'

# --- Extra front ---
# Leading `(?!{direction}\s)` keeps a leading direction-letter from being
# captured here so coord/pre_direction can claim it. Two-alternative form
# (direction-then-digit case first) prevents greedy matching of `\d`
# from swallowing a trailing direction letter inside the prefix.
[[step]]
type = "extract"
label = "extra_front"
pattern = '^(?!{direction}\s)(?:(?:[A-Z\W]+\s)+(?=(?:{direction})\s\d))|^(?!{direction}\s)(?:(?:[A-Z\W]+\s)+(?=\d))'
output_col = "extra_front"
skip_if_filled = true

# --- Street number ---
[[step]]
type = "extract"
label = "street_number_coords"
pattern = '^([NSEW])\W?(\d+)\W?([NSEW])\W?(\d+)\b'
output_col = "street_number"
skip_if_filled = true
replacement = '$1$2 $3$4'

# Single-pair coord (e.g. `N 123 MAIN ST` → street_number `N123`).
[[step]]
type = "extract"
label = "street_number_coord"
pattern = '^([NSEW])\W?(\d+)\b'
output_col = "street_number"
skip_if_filled = true
replacement = '$1$2'

[[step]]
type = "extract"
label = "street_number"
pattern = '^\d+\b'
output_col = "street_number"
skip_if_filled = true

[[step]]
type = "extract"
label = "unit_fraction"
pattern = '^[1-9]/\d+\b'
output_col = "unit"
skip_if_filled = true

# --- Building ---
[[step]]
type = "extract"
label = "building"
pattern = '\b(BUILDING|BL?DG|BL[DG])\W*(\d+|[A-Z])\b'
output_col = { building_type = 1, building = 2 }
skip_if_filled = true

# --- Unit ---
[[step]]
type = "extract"
label = "unit_type_value"
pattern = '(\b(?:{unit_type})\b|#)\W*(\d+-\d+[A-Z]?|[A-Z]{1,2}\W*\d+|\d+\W?[A-Z0-9]?|\d[A-Z]\d+|[A-Z]{1,2}-\d+|\d+|[A-Z])\s*$'
output_col = { unit_type = 1, unit = 2 }
skip_if_filled = true

[[step]]
type = "extract"
label = "unit_location"
pattern = '\b({unit_location})\s*$'
output_col = "unit"
skip_if_filled = true

# Catches bare trailing units like `MAIN ST 5B` (no UNIT/APT prefix).
# The trailing `[A-DF-MO-RT-VX-Z]` is `[A-Z]` minus N/S/E/W so a single-
# letter post-direction isn't stolen by this step.
[[step]]
type = "extract"
label = "unit_bare"
pattern = '\b([A-Z]{1,2}-?\d+|\d+-?[A-Z]|\d[A-Z]\d+|\d+|ADJ?|[A-DF-MO-RT-VX-Z])$'
output_col = "unit"
skip_if_filled = true

# --- Direction ---
[[step]]
type = "extract"
label = "post_direction"
pattern = '(?<!^)\b({direction})\s*$'
output_col = "post_direction"
skip_if_filled = true

# --- Suffix ---
[[step]]
type = "extract"
label = "suffix_common"
pattern = '(?<!^)\b({suffix:common})\s*$'
output_col = "suffix"
skip_if_filled = true

[[step]]
type = "extract"
label = "suffix_all"
pattern = '(?<!^)\b({suffix})\s*$'
output_col = "suffix"
skip_if_filled = true

# --- Pre-direction ---
[[step]]
type = "extract"
label = "pre_direction"
pattern = '^\b({direction})\b(?!$)'
output_col = "pre_direction"
skip_if_filled = true

# --- Street name cleanup ---
[[step]]
type = "rewrite"
label = "street_name_squish"
pattern = '^(O|MC) ([A-Z]{3,})'
replacement = '$1$2'

[[step]]
type = "rewrite"
label = "street_name_start"
pattern = '^({street_name:start})\b'
table = "street_name"

[[step]]
type = "rewrite"
label = "street_name_name"
pattern = '\b({street_name:name})\b'
table = "street_name"

# --- Post-extraction cleanup ---
[[step]]
type = "rewrite"
label = "strip_zeros_street_number"
pattern = '^0+(?=\d)'
replacement = ''
input_col = "street_number"

[[step]]
type = "rewrite"
label = "strip_zeros_unit"
pattern = '^0+(?=\d)'
replacement = ''
input_col = "unit"

# --- Standardization ---
[[step]]
type = "rewrite"
label = "standardize_pre_direction"
input_col = "pre_direction"
table = "direction"

[[step]]
type = "rewrite"
label = "standardize_post_direction"
input_col = "post_direction"
table = "direction"

[[step]]
type = "rewrite"
label = "standardize_suffix"
input_col = "suffix"
table = "suffix"

[[step]]
type = "rewrite"
label = "standardize_unit_location"
input_col = "unit"
table = "unit_location"

[[step]]
type = "rewrite"
label = "standardize_state"
input_col = "state"
table = "state"

[[step]]
type = "rewrite"
label = "standardize_building_type"
input_col = "building_type"
pattern = '.+'
replacement = 'BUILDING'
